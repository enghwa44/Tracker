name: Fetch KODEX Price

on:
  schedule:
    - cron: '0 0,1,2,3,4,5,6,23 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-price:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Write price.json
        run: |
          PRICE=$(curl -s "https://query1.finance.yahoo.com/v7/finance/quote?symbols=498400.KS" \
            -H "Accept: application/json" | \
            python3 -c "
          import sys, json
          try:
            d = json.load(sys.stdin)
            r = d['quoteResponse']['result'][0]
            p = r.get('regularMarketPrice') or r.get('previousClose')
            print(int(p))
          except:
            print(0)
          ")
          echo "Price: $PRICE"
          echo "{\"price\": $PRICE, \"updated\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > price.json
          cat price.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add price.json
          git diff --staged --quiet || git commit -m "Update KODEX price"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
