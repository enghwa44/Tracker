name: Fetch KODEX Price

on:
  schedule:
    - cron: '0 0,1,2,3,4,5,6,23 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-price:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch KODEX price via Python
        run: |
          python3 << 'EOF'
          import urllib.request, json, re
          from datetime import datetime

          headers = {
            'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120.0.0.0 Safari/537.36',
            'Accept': 'application/json, text/plain, */*',
            'Accept-Language': 'ko-KR,ko;q=0.9',
            'Referer': 'https://m.stock.naver.com/',
          }

          price = 0

          # 1. 네이버 모바일 API (실시간 현재가)
          try:
            req = urllib.request.Request(
              'https://m.stock.naver.com/api/stock/498400/basic',
              headers=headers
            )
            with urllib.request.urlopen(req, timeout=10) as r:
              d = json.loads(r.read().decode('utf-8'))
              cp = d.get('closePrice', '0')
              price = int(str(cp).replace(',', ''))
              print(f"네이버 모바일 basic: {price}")
          except Exception as e:
            print(f"네이버 모바일 basic 실패: {e}")

          # 2. 네이버 실시간 polling API
          if not price:
            try:
              req = urllib.request.Request(
                'https://polling.finance.naver.com/api/realtime/domestic/stock/498400',
                headers=headers
              )
              with urllib.request.urlopen(req, timeout=10) as r:
                d = json.loads(r.read().decode('utf-8'))
                cp = d.get('datas', [{}])[0].get('closePrice', '0')
                price = int(str(cp).replace(',', ''))
                print(f"네이버 polling: {price}")
            except Exception as e:
              print(f"네이버 polling 실패: {e}")

          # 3. Yahoo Finance
          if not price:
            try:
              req = urllib.request.Request(
                'https://query1.finance.yahoo.com/v8/finance/quote?symbols=498400.KS',
                headers={**headers, 'Accept': 'application/json'}
              )
              with urllib.request.urlopen(req, timeout=10) as r:
                d = json.loads(r.read())
                res = d['quoteResponse']['result']
                if res:
                  price = int(res[0].get('regularMarketPrice') or res[0].get('previousClose') or 0)
                  print(f"Yahoo: {price}")
            except Exception as e:
              print(f"Yahoo 실패: {e}")

          out = json.dumps({"price": price, "updated": datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ')})
          print(f"최종: {out}")
          with open('price.json', 'w') as f:
            f.write(out)
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add price.json
          git diff --staged --quiet || git commit -m "Update KODEX price"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
