name: Fetch KODEX Price

on:
  schedule:
    - cron: '0 0,1,2,3,4,5,6,23 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-price:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create fetch script
        run: |
          cat > fetch.py << 'PYEOF'
import urllib.request, json, re
from datetime import datetime

headers = {
  'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120.0.0.0 Safari/537.36',
  'Accept': 'application/json',
  'Referer': 'https://m.stock.naver.com/',
}

def fetch_json(url):
  try:
    req = urllib.request.Request(url, headers=headers)
    with urllib.request.urlopen(req, timeout=10) as r:
      return json.loads(r.read().decode('utf-8'))
  except Exception as e:
    print(f"실패 {url}: {e}")
    return None

price = 0
kospi200 = 0.0
vkospi = 0.0

d = fetch_json('https://m.stock.naver.com/api/stock/498400/basic')
if d:
  cp = str(d.get('closePrice','0')).replace(',','')
  try: price = int(cp)
  except: pass
  print(f"KODEX: {price}")

d2 = fetch_json('https://m.stock.naver.com/api/index/KOSPI200/basic')
if d2:
  cp2 = str(d2.get('closePrice','0')).replace(',','')
  try: kospi200 = float(cp2)
  except: pass
  print(f"KOSPI200: {kospi200}")

for code in ['VKOSPI', 'KOSPI%20VIX']:
  d3 = fetch_json(f'https://m.stock.naver.com/api/index/{code}/basic')
  if d3:
    cp3 = str(d3.get('closePrice','0')).replace(',','')
    try:
      vkospi = float(cp3)
      print(f"V-KOSPI ({code}): {vkospi}")
      break
    except: pass

out = json.dumps({"price": price, "kospi200": kospi200, "vkospi": vkospi, "updated": datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ')})
print(f"최종: {out}")
with open('price.json', 'w') as f:
  f.write(out)
PYEOF

      - name: Run fetch script
        run: python3 fetch.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add price.json
          git diff --staged --quiet || git commit -m "Update KODEX price"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
